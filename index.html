<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notre Mariage</title>

    <meta property="og:title" content="Orna & Alexandre - Invitation">
    <meta property="og:description" content="Nous sommes heureux de vous inviter à célébrer notre union. Cliquez pour répondre au RSVP.">
    <meta property="og:image" content="https://elie1501.github.io/fina.jpg">
    <meta property="og:url" content="https://elie1501.github.io/">
    <meta property="og:type" content="website">

    <style>
        :root { --gold: #d4b499; --white: #ffffff; --nav-h: 70px; }
        html { scroll-behavior: smooth; }
        body, html { margin: 0; padding: 0; background: var(--white); font-family: 'Optima', 'Georgia', serif; overflow-x: hidden; width: 100%; height: 100%; }

        /* --- ÉCRAN D'ACCUEIL --- */
        #page-index {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            display: flex; align-items: center; justify-content: center;
            z-index: 3000;
            perspective: 2000px;
            transition: opacity 1s ease, visibility 1s;
        }
        .book-cover {
            width: 100%; max-width: 350px;
            cursor: pointer; transform-style: preserve-3d;
            transform-origin: left center;
            transition: transform 1.5s cubic-bezier(0.645, 0.045, 0.355, 1);
        }
        .sceau-img { width: 100%; height: auto; display: block; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1)); }
        .page-turn-active { transform: rotateY(-140deg); opacity: 0; }
        .hidden-index { opacity: 0; visibility: hidden; pointer-events: none; }

        /* --- PAGE INVITATION --- */
        #page-invitation { display: none; opacity: 0; width: 100%; }
        #page-invitation.visible { display: block; opacity: 1; }

        nav {
            background: var(--white); position: fixed; top: 0; width: 100%; min-height: var(--nav-h);
            z-index: 1000; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-bottom: 1px solid #f0f0f0; padding: 10px 0;
        }
        nav ul { list-style: none; display: flex; gap: 15px; margin: 0; padding: 0 10px; flex-wrap: wrap; justify-content: center; }
        nav ul li a { text-decoration: none; color: var(--gold); font-weight: 700; font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase; }

        section { width: 100%; line-height: 0; display: flex; justify-content: center; background: #fff; }
        #mairie { padding-top: 80px; }
        .img-full { width: 100%; max-width: 900px; height: auto; display: block; }

        /* RSVP STYLES */
        #rsvp { line-height: normal; padding: 60px 15px; background: #fafafa; display: flex; justify-content: center; }
        .rsvp-card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); width: 100%; max-width: 450px; box-sizing: border-box; }

        .event-container { margin-bottom: 12px; border: 1px solid #f0f0f0; border-radius: 12px; padding: 12px; background: #fff; }
        .event-header { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .event-name { font-weight: bold; color: var(--gold); text-transform: uppercase; font-size: 0.75rem; }

        .radio-group { display: flex; background: #f8f8f8; border-radius: 8px; padding: 2px; border: 1px solid #eee; min-width: 150px; }
        .radio-group label { padding: 8px 10px; cursor: pointer; font-size: 0.65rem; flex: 1; text-align: center; font-weight: 700; color: #999; }
        .radio-group input { display: none; }
        .radio-group label:has(input:checked) { background: var(--gold); color: white; border-radius: 6px; }

        .qty-selection { max-height: 0; overflow: hidden; transition: all 0.4s ease; opacity: 0; }
        .event-container:has(input[value="Présent"]:checked) .qty-selection { max-height: 80px; opacity: 1; margin-top: 12px; padding-top: 12px; border-top: 1px dashed #eee; }
        .qty-input { display: flex; align-items: center; justify-content: space-between; }

        .message-section { margin-top: 20px; margin-bottom: 20px; }
        .message-section label { display: block; font-size: 0.75rem; font-weight: bold; color: var(--gold); text-transform: uppercase; margin-bottom: 8px; }
        .message-section textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-family: inherit; font-size: 0.9rem; resize: vertical; }

        .btn { background: var(--gold); color: white; border: none; padding: 16px; width: 100%; cursor: pointer; font-weight: bold; text-transform: uppercase; border-radius: 4px; transition: 0.3s; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }

        /* AUDIO */
        .audio-control { position: fixed; bottom: 25px; right: 20px; z-index: 4000; background: var(--white); border: 1px solid var(--gold); border-radius: 50%; width: 50px; height: 50px; display: none; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .audio-icon { fill: var(--gold); width: 22px; height: 22px; }
        .playing { animation: pulse-gold 2s infinite; }
        @keyframes pulse-gold { 0% { box-shadow: 0 0 0 0 rgba(212, 180, 153, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(212, 180, 153, 0); } 100% { box-shadow: 0 0 0 0 rgba(212, 180, 153, 0); } }

        @media (max-width: 480px) {
            nav ul { gap: 8px; }
            #mairie { padding-top: 100px; }
            .event-header { flex-direction: column; align-items: flex-start; }
            .radio-group { width: 100%; margin-top: 5px; }
        }
    </style>
</head>
<body>

<div id="page-index">
    <div class="book-cover" id="cover">
        <img src="sceau1.png" class="sceau-img" alt="Sceau Royal">
    </div>
</div>

<div id="page-invitation">
    <nav>
        <ul>
            <li><a href="#mairie">MAIRIE</a></li>
            <li><a href="#henne">HENNÉ</a></li>
            <li><a href="#houppa">HOUPPA</a></li>
            <li><a href="#infos">INFOS</a></li>
            <li><a href="#rsvp">RSVP</a></li>
        </ul>
    </nav>

    <section id="mairie"><img src="mairie1.png" class="img-full"></section>
    <section id="henne"><img src="henne1.png" class="img-full"></section>
    <section id="houppa"><img src="houppa1.jpg" class="img-full"></section>
    <section id="infos"><img src="info.jpg" class="img-full"></section>

    <section id="rsvp">
        <div class="rsvp-card">
            <h2 style="text-align:center; color:var(--gold); letter-spacing:3px; text-transform:uppercase;">RSVP</h2>
            <form id="weddingForm">
                <div style="margin-bottom: 15px;">
                    <label style="font-size: 0.8rem;">NOM DE FAMILLE</label>
                    <input type="text" name="Nom" placeholder="Ex: Famille Levy" required style="width:100%; padding:12px; border:1px solid #ddd; border-radius:4px; box-sizing:border-box;">
                </div>

                <div class="event-container">
                    <div class="event-header">
                        <span class="event-name">Mairie</span>
                        <div class="radio-group">
                            <label><input type="radio" name="Mairie" value="Présent"> Présent</label>
                            <label><input type="radio" name="Mairie" value="Absent" checked> Absent</label>
                        </div>
                    </div>
                    <div class="qty-selection"><div class="qty-input"><label>Adultes</label><input type="number" name="Mairie_Nb" min="0" value="0" oninput="this.value = Math.abs(this.value)" style="width:50px; padding:5px;"></div></div>
                </div>

                <div class="event-container">
                    <div class="event-header">
                        <span class="event-name">Henné</span>
                        <div class="radio-group">
                            <label><input type="radio" name="Henne" value="Présent"> Présent</label>
                            <label><input type="radio" name="Henne" value="Absent" checked> Absent</label>
                        </div>
                    </div>
                    <div class="qty-selection"><div class="qty-input"><label>Adultes</label><input type="number" name="Henne_nb" min="0" value="0" oninput="this.value = Math.abs(this.value)" style="width:50px; padding:5px;"></div></div>
                </div>

                <div class="event-container">
                    <div class="event-header">
                        <span class="event-name">Houppa</span>
                        <div class="radio-group">
                            <label><input type="radio" name="Houppa" value="Présent"> Présent</label>
                            <label><input type="radio" name="Houppa" value="Absent" checked> Absent</label>
                        </div>
                    </div>
                    <div class="qty-selection"><div class="qty-input"><label>Adultes</label><input type="number" name="Houppa_Nb" min="0" value="0" oninput="this.value = Math.abs(this.value)" style="width:50px; padding:5px;"></div></div>
                </div>

                <div class="message-section">
                    <label>Un petit mot pour les mariés ?</label>
                    <textarea name="Message" placeholder="Félicitations ! On a hâte d'être parmi vous..." rows="3"></textarea>
                </div>

                <button type="submit" class="btn" id="submitBtn">Envoyer ma réponse</button>
            </form>
        </div>
    </section>
</div>

<div id="musicToggle" class="audio-control">
    <svg class="audio-icon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
</div>
<audio id="mainAudio" src="2025.mp3" preload="auto" loop></audio>

<script>
    const cover = document.getElementById('cover');
    const indexPage = document.getElementById('page-index');
    const invitationPage = document.getElementById('page-invitation');
    const audio = document.getElementById('mainAudio');
    const musicBtn = document.getElementById('musicToggle');

    const scriptURL = 'https://script.google.com/macros/s/AKfycbwi-1b0xZG1Z94jrGc19bU7nGShziuvikUnRuvDGX827UFSV4SzkOE3X0tjyQOceLNx/exec';
    const form = document.getElementById('weddingForm');
    const btn = document.getElementById('submitBtn');

    document.querySelectorAll('input[type="radio"]').forEach(radio => {
        radio.addEventListener('change', (e) => {
            const container = e.target.closest('.event-container');
            const qtyInput = container.querySelector('input[type="number"]');
            if (qtyInput) {
                if (e.target.value === "Absent") {
                    qtyInput.min = 0;
                    qtyInput.value = 0;
                    qtyInput.readOnly = true;
                    qtyInput.style.opacity = "0.5";
                } else if (e.target.value === "Présent") {
                    qtyInput.min = 1;
                    qtyInput.readOnly = false;
                    qtyInput.style.opacity = "1";
                    if (parseInt(qtyInput.value) <= 0 || qtyInput.value === "") {
                        qtyInput.value = 1;
                    }
                }
            }
        });
    });

    cover.addEventListener('click', function() {
        audio.play().then(() => {
            musicBtn.style.display = 'flex';
            musicBtn.classList.add('playing');
        }).catch(err => console.log("Audio bloqué"));

        this.classList.add('page-turn-active');
        setTimeout(() => {
            indexPage.classList.add('hidden-index');
            invitationPage.classList.add('visible');
            window.scrollTo(0,0);
        }, 1000);
    });

    musicBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (audio.paused) {
            audio.play();
            musicBtn.classList.add('playing');
        } else {
            audio.pause();
            musicBtn.classList.remove('playing');
        }
    });

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = "Envoi en cours...";

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: new FormData(form)
        })
            .then(() => {
                btn.innerText = "C'est envoyé !";
                btn.style.background = "#4CAF50";
                alert("Merci ! Votre réponse a bien été enregistrée.");
            })
            .catch(error => {
                console.error('Erreur !', error.message);
                btn.disabled = false;
                btn.innerText = "Réessayer";
                alert("Une erreur est survenue lors de l'envoi.");
            });
    });
</script>
</body>
</html>
